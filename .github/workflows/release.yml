name: Build & Release APK

on:
  push:
    branches: [main]
    paths:
      - 'app/build.gradle.kts'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.result.outputs.should_build }}
      version_name: ${{ steps.result.outputs.version_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract current version
        id: current
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | sed 's/[^0-9]*//g')
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Check version change (push trigger)
        id: push_check
        if: github.event_name == 'push'
        run: |
          git show HEAD~1:app/build.gradle.kts > /tmp/prev_build.gradle.kts 2>/dev/null || true
          PREV_VERSION=$(grep 'versionName' /tmp/prev_build.gradle.kts 2>/dev/null | sed 's/.*"\(.*\)".*/\1/' || echo "")
          if [ "${{ steps.current.outputs.version_name }}" != "$PREV_VERSION" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version (manual trigger)
        id: bump
        if: github.event_name == 'workflow_dispatch'
        run: |
          OLD_NAME="${{ steps.current.outputs.version_name }}"
          OLD_CODE="${{ steps.current.outputs.version_code }}"
          NEW_NAME=$(awk "BEGIN {printf \"%.2f\", $OLD_NAME + 0.01}")
          NEW_CODE=$((OLD_CODE + 1))
          sed -i "s/versionName = \"$OLD_NAME\"/versionName = \"$NEW_NAME\"/" app/build.gradle.kts
          sed -i "s/versionCode = $OLD_CODE/versionCode = $NEW_CODE/" app/build.gradle.kts
          echo "version_name=$NEW_NAME" >> "$GITHUB_OUTPUT"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git commit -m "chore: bump version to $NEW_NAME"
          git push

      - name: Set outputs
        id: result
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "version_name=${{ steps.bump.outputs.version_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=${{ steps.push_check.outputs.changed }}" >> "$GITHUB_OUTPUT"
            echo "version_name=${{ steps.current.outputs.version_name }}" >> "$GITHUB_OUTPUT"
          fi

  build-and-release:
    needs: resolve-version
    if: needs.resolve-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Missing ANDROID_KEYSTORE_BASE64 secret"
            exit 1
          fi
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$GITHUB_WORKSPACE/release-keystore.jks"

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/release-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew -Pandroid.useAndroidX=true assembleRelease

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/DS-Translator-v${{ needs.resolve-version.outputs.version_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.resolve-version.outputs.version_name }}
          name: DS Translator v${{ needs.resolve-version.outputs.version_name }}
          generate_release_notes: true
          files: app/build/outputs/apk/release/DS-Translator-v${{ needs.resolve-version.outputs.version_name }}.apk
