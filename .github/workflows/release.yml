name: Build & Release APK

on:
  push:
    branches: [main]
    paths:
      - 'app/build.gradle.kts'

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.changed }}
      version_name: ${{ steps.check.outputs.version_name }}
      version_code: ${{ steps.check.outputs.version_code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extract current version
        id: current
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | sed 's/[^0-9]*//g')
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Extract previous version
        id: previous
        run: |
          git show HEAD~1:app/build.gradle.kts > /tmp/prev_build.gradle.kts 2>/dev/null || true
          PREV_VERSION=$(grep 'versionName' /tmp/prev_build.gradle.kts 2>/dev/null | sed 's/.*"\(.*\)".*/\1/' || echo "")
          echo "version_name=$PREV_VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if version changed
        id: check
        run: |
          if [ "${{ steps.current.outputs.version_name }}" != "${{ steps.previous.outputs.version_name }}" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version_name=${{ steps.current.outputs.version_name }}" >> "$GITHUB_OUTPUT"
          echo "version_code=${{ steps.current.outputs.version_code }}" >> "$GITHUB_OUTPUT"

  build-and-release:
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release-unsigned.apk \
             app/build/outputs/apk/release/DS-Translator-v${{ needs.check-version.outputs.version_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version_name }}
          name: DS Translator v${{ needs.check-version.outputs.version_name }}
          generate_release_notes: true
          files: app/build/outputs/apk/release/DS-Translator-v${{ needs.check-version.outputs.version_name }}.apk
